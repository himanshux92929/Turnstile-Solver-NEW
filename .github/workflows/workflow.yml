name: Turnstile Solver – Setup & Demo Check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  setup-and-run:
    name: Setup Turnstile Solver
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Create virtual environment
      - name: Create virtual environment
        run: python -m venv venv

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Install Chromium via patchright
      - name: Install Chromium via patchright
        run: |
          source venv/bin/activate
          python -m patchright install chromium
          python -m patchright install-deps chromium || true

      # 6. Install extra system libraries Chromium needs on Ubuntu 24.04
      #    Note: libasound2 was renamed to libasound2t64 in Ubuntu 24.04
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 \
            libcairo2 libxshmfence1 libx11-xcb1

      # 7. Start the solver API in the background
      - name: Start Turnstile Solver API
        run: |
          source venv/bin/activate
          nohup python api_solver.py \
            --browser_type chromium \
            --thread 2 \
            --port 6080 \
            --host 0.0.0.0 > solver.log 2>&1 &
          echo $! > solver.pid
          echo "Solver PID: $(cat solver.pid)"

      # 8. Wait until the API is accepting connections (up to 60 s)
      - name: Wait for API to become ready
        run: |
          echo "Waiting for solver API on port 6080..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6080/ 2>/dev/null || true)
            if [[ "$HTTP_CODE" =~ ^[2345][0-9][0-9]$ ]]; then
              echo "API is up after ${i}s (HTTP $HTTP_CODE)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Solver API did not start within 60 seconds"
              cat solver.log || true
              exit 1
            fi
            sleep 1
          done

      # ─────────────────────────────────────────────────────────────────────
      # Demo Turnstile check – submit + poll in ONE step (up to 5 retries)
      #
      # KEY FIX: the API returns "taskId" (camelCase), not "task_id"
      # as the README shows. Every JSON parse uses "taskId".
      # Submit and poll are in the same step so the variable is always
      # in scope; no GITHUB_OUTPUT plumbing needed.
      # ─────────────────────────────────────────────────────────────────────
      - name: Demo – Turnstile Solve Check (submit + poll, up to 5 retries)
        run: |
          TARGET_URL="https://deltastudy.site/verify"
          SITEKEY="0x4AAAAAADnpjMgvQPlaYYog"
          MAX_RETRIES=5

          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "══════════════════════════════════════════"
            echo "Attempt $ATTEMPT / $MAX_RETRIES"
            echo "══════════════════════════════════════════"

            # ── SUBMIT ──────────────────────────────────────────────────────
            # API response: {"errorId":0,"taskId":"<uuid>"}   (camelCase!)
            RESPONSE=$(curl -sf \
              "http://localhost:6080/turnstile?url=${TARGET_URL}&sitekey=${SITEKEY}" \
              2>&1) || true
            echo "Submit response: $RESPONSE"

            TASK_ID=$(echo "$RESPONSE" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('taskId',''))" \
              2>/dev/null || true)

            if [ -z "$TASK_ID" ] || [ "$TASK_ID" = "null" ]; then
              echo "::warning::No taskId in submit response on attempt $ATTEMPT."
              if [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; then
                sleep 5
                continue
              fi
              echo "::error::Could not get a taskId after $MAX_RETRIES attempts."
              cat solver.log || true
              exit 1
            fi

            echo "Got taskId: $TASK_ID — polling for result…"

            # ── POLL (up to 90 s, every 5 s = 18 ticks) ────────────────────
            SOLVED=false
            for TICK in $(seq 1 18); do
              sleep 5
              RESULT=$(curl -sf "http://localhost:6080/result?id=${TASK_ID}" 2>&1) || true
              echo "  [tick ${TICK}/18] $RESULT"

              STATUS=$(echo "$RESULT" | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" \
                2>/dev/null || true)

              if [ "$STATUS" = "ready" ]; then
                TOKEN=$(echo "$RESULT" | \
                  python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('value',''))" \
                  2>/dev/null || true)
                ELAPSED=$(echo "$RESULT" | \
                  python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('elapsed_time',''))" \
                  2>/dev/null || true)
                echo ""
                echo "╔══════════════════════════════════════╗"
                echo "║          ✅  SUCCESS                 ║"
                echo "╚══════════════════════════════════════╝"
                echo ""
                echo "  Attempt  : $ATTEMPT / $MAX_RETRIES"
                echo "  taskId   : $TASK_ID"
                echo "  Token    : ${TOKEN:0:50}…"
                echo "  Elapsed  : ${ELAPSED}s"
                echo ""
                SOLVED=true
                break
              elif [ "$STATUS" = "fail" ]; then
                echo "::warning::Solver returned status=fail (tick $TICK, attempt $ATTEMPT). Will retry."
                break
              elif [ "$STATUS" = "processing" ]; then
                echo "  Still processing…"
              else
                echo "  Unexpected status '${STATUS}', continuing to poll…"
              fi
            done

            if $SOLVED; then
              echo "Demo check passed. Workflow complete. 🎉"
              exit 0
            fi

            if [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $ATTEMPT did not resolve. Retrying with a fresh task…"
            fi
          done

          echo "::error::Turnstile solve did not succeed after $MAX_RETRIES attempts."
          cat solver.log || true
          exit 1

      # 10. Always print solver log on failure for easy debugging
      - name: Print solver log (on failure)
        if: failure()
        run: cat solver.log || echo "No solver log found"

      # 11. Stop background solver gracefully
      - name: Stop solver
        if: always()
        run: |
          if [ -f solver.pid ]; then
            PID=$(cat solver.pid)
            kill "$PID" 2>/dev/null && echo "Solver (PID $PID) stopped." || true
          fi
